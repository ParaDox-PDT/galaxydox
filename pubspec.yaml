name: galaxydox
description: "A premium NASA explorer app built with Flutter."

publish_to: 'none'

version: 1.0.1+2

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  go_router: ^17.1.0
  dio: ^5.9.2
  cached_network_image: ^3.4.1
  google_fonts: ^8.0.2
  intl: ^0.20.2
  freezed_annotation: ^3.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  json_annotation: ^4.11.0
  connectivity_plus: ^7.0.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  url_launcher: ^6.3.2
  share_plus: ^12.0.1
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  model_viewer_plus: ^1.10.0
  video_player: ^2.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.13.0
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/3d_models/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/galaxydox.png
  min_sdk_android: 21
  adaptive_icon_background: "#08111F"
  adaptive_icon_foreground: assets/images/galaxydox.png
  remove_alpha_ios: true

flutter_native_splash:
  color: "#040B16"
  image: assets/images/galaxydox.png
  android: true
  ios: true
  android_12:
    color: "#040B16"
    image: assets/images/galaxydox.png


